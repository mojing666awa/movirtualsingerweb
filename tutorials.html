<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教程中心 | Mo Virtual Singer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','Noto Sans SC','sans-serif'],mono:['JetBrains Mono','monospace']},colors:{brand:{500:'#0ea5e9',600:'#0284c7'}},animation:{'blob':'blob 10s infinite'},keyframes:{blob:{'0%':{transform:'translate(0px,0px) scale(1)'},'33%':{transform:'translate(30px,-50px) scale(1.1)'},'66%':{transform:'translate(-20px,20px) scale(0.9)'},'100%':{transform:'translate(0px,0px) scale(1)'}}}}}}</script>
    <style>body{background-color:#0f172a;color:white;overflow-x:hidden}.ambient-bg{position:fixed;inset:0;z-index:-1;overflow:hidden;background:radial-gradient(circle at 50% 0%,#1e3a8a 0%,#0f172a 70%)}.blob{position:absolute;filter:blur(80px);opacity:0.4;border-radius:50%}.glass-panel{background:rgba(255,255,255,0.03);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.08)}.terminal-window{background:#0d1117;border:1px solid #30363d;font-family:'JetBrains Mono',monospace}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:3px}</style>
</head>
<body class="antialiased">
    <div class="ambient-bg"><div class="blob bg-blue-600 w-96 h-96 top-0 left-1/4 animate-blob"></div><div class="blob bg-cyan-500 w-96 h-96 top-1/3 right-1/4 animate-blob" style="animation-delay:2s"></div><div class="blob bg-indigo-600 w-96 h-96 bottom-0 left-1/3 animate-blob" style="animation-delay:4s"></div></div>

    <div class="w-full py-2 text-xs font-medium border-b border-white/5 bg-black/20 backdrop-blur-md relative z-50"><div class="max-w-7xl mx-auto px-4 flex justify-between items-center"><span class="text-slate-400 hidden sm:inline"><i class="fas fa-link mr-1"></i> 生态与友链：</span><div class="flex items-center gap-4 sm:gap-6 ml-auto"><a href="https://www.bilibili.com" target="_blank" class="flex items-center gap-1.5 text-slate-300 hover:text-[#FB7299] transition-colors"><i class="fab fa-bilibili"></i> Bilibili</a><a href="https://dreamtonics.com/synthesizerv/" target="_blank" class="flex items-center gap-1.5 text-slate-300 hover:text-[#00d4ff] transition-colors"><i class="fas fa-wave-square"></i> SynthV</a></div></div></div>

    <nav class="sticky top-0 z-40 w-full border-b border-white/5 bg-slate-900/60 backdrop-blur-xl"><div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between"><a href="index.html" class="flex items-center gap-2"><div class="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-500 to-cyan-400 flex items-center justify-center text-white font-bold">M</div><span class="font-bold text-xl tracking-tight">MVS <span class="text-brand-500 font-light">Studio</span></span></a><div class="hidden md:flex items-center gap-8 text-sm font-medium text-slate-300"><a href="index.html#features" class="hover:text-white transition-colors">核心技术</a><a href="tutorials.html" class="text-white transition-colors">使用教程</a><a href="download.html" class="hover:text-white transition-colors">软件下载</a><a href="community.html" class="hover:text-white transition-colors">社区生态</a><a href="faq.html" class="hover:text-white transition-colors">FAQ</a><a href="https://github.com/mojing666awa/Mo-Virtual-Singer" target="_blank" class="px-4 py-2 rounded-full bg-white/10 hover:bg-white/20 text-white transition-all border border-white/10"><i class="fab fa-github mr-1"></i> GitHub</a></div><button id="mobile-menu-btn" class="md:hidden text-white text-xl"><i class="fas fa-bars"></i></button></div><div id="mobile-menu" class="hidden md:hidden bg-slate-900/95 backdrop-blur-xl border-b border-white/5 px-4 py-4 space-y-3 text-sm"><a href="index.html" class="block text-slate-300">首页</a><a href="tutorials.html" class="block text-white font-medium">使用教程</a><a href="download.html" class="block text-slate-300">软件下载</a><a href="community.html" class="block text-slate-300">社区生态</a><a href="faq.html" class="block text-slate-300">FAQ</a><a href="https://github.com/mojing666awa/Mo-Virtual-Singer" target="_blank" class="block text-brand-500"><i class="fab fa-github mr-2"></i>GitHub 仓库</a></div></nav>

    <main class="max-w-7xl mx-auto px-4 py-12 min-h-screen flex flex-col lg:flex-row gap-8 relative">
        <!-- 左侧目录 (桌面端显示) -->
        <aside class="hidden lg:block w-64 flex-shrink-0 sticky top-24 h-fit max-h-[calc(100vh-8rem)] overflow-y-auto pr-2">
            <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">学习路径</h3>
            <div class="space-y-1" id="toc-container"></div>
            <div class="glass-panel rounded-xl p-4 mt-8">
                <div class="flex justify-between text-xs text-slate-400 mb-2"><span>完成度</span><span id="progress-text">0%</span></div>
                <div class="w-full h-1.5 bg-white/5 rounded-full overflow-hidden"><div id="progress-bar" class="h-full bg-gradient-to-r from-brand-500 to-cyan-400 transition-all duration-500 ease-out" style="width:0%"></div></div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <div class="flex-1 min-w-0">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-10">
                <div><h1 class="text-3xl md:text-4xl font-bold mb-2">MVS 官方文档</h1><p class="text-slate-400">从环境搭建到声库发布的完整工作流指南</p></div>
                <div class="relative group"><i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"></i><input type="text" placeholder="搜索文档..." class="bg-white/5 border border-white/10 rounded-lg pl-9 pr-4 py-2 text-sm focus:outline-none focus:border-brand-500 w-full sm:w-48 focus:w-64 transition-all"></div>
            </div>
            <div id="tutorial-content" class="space-y-16 pb-20"></div>
        </div>
    </main>

    <footer class="border-t border-white/5 py-10 px-4 mt-auto text-center text-xs text-slate-500 bg-slate-900/50 backdrop-blur-sm"><p>&copy; 2026 mojing666 & MVS Contributors. Licensed under Apache-2.0 / MIT.</p></footer>

    <script>
        document.getElementById('mobile-menu-btn').addEventListener('click',()=>{document.getElementById('mobile-menu').classList.toggle('hidden')});
        const tutorials=[{id:'ep01',title:'环境配置与安装',tag:'入门基础',desc:'MVS 支持 Windows、macOS 和 Linux。请确保 GPU 显存 ≥ 6GB。',code:'git clone https://github.com/mojing666awa/Mo-Virtual-Singer.git\ncd Mo-Virtual-Singer && pip install -r requirements.txt',tips:'Windows 用户需提前安装 CUDA 12.1 Toolkit。'},{id:'ep02',title:'干声录制与预处理',tag:'数据准备',desc:'使用内置 MVS Recorder 进行标准化采集，采样率统一为 44100Hz/16bit。',code:'mvs-recorder --sample-rate 44100\nmvs-preprocess ./raw_audio --auto-align',tips:'每句录音前后建议保留 0.3s 静音段。'},{id:'ep03',title:'姿态空间预训练',tag:'核心训练',desc:'WavLM 特征提取器将音频映射到高维姿态流形。',code:'python train.py --config configs/posture.yaml --accelerator gpu',tips:'当 UMAP 可视化呈现清晰聚类时即可停止预训练。'},{id:'ep04',title:'OpenUtau 对接调教',tag:'编辑器集成',desc:'将导出的 ONNX 模型放入 OpenUtau/Singers/MVS/ 目录。',code:null,tips:'Posture XY 滑块可用于实时调整发声姿态。'}];
        const cc=document.getElementById('tutorial-content'),tc=document.getElementById('toc-container');
        tutorials.forEach((t,i)=>{const ti=document.createElement('a');ti.href=`#${t.id}`;ti.className='block px-3 py-2 rounded-lg text-sm text-slate-400 hover:text-white hover:bg-white/5 transition-all truncate';ti.innerHTML=`<span class="text-slate-600 mr-2 text-xs">0${i+1}</span>${t.title}`;tc.appendChild(ti);const s=document.createElement('section');s.id=t.id;s.className='scroll-mt-28 opacity-0 translate-y-4 transition-all duration-700';let cb=t.code?`<div class="terminal-window rounded-xl overflow-hidden my-6 p-4 text-sm text-slate-300 whitespace-pre overflow-x-auto">${t.code}</div>`:'';s.innerHTML=`<div class="glass-panel rounded-3xl p-6 sm:p-10 border-l-2 border-transparent"><div class="flex items-center gap-4 mb-6"><div class="w-10 h-10 rounded-full border-2 border-white/10 flex items-center justify-center font-bold text-sm bg-slate-800">${i+1}</div><div><span class="text-xs font-bold text-brand-500 uppercase">EP.0${i+1} · ${t.tag}</span><h2 class="text-2xl font-bold mt-1">${t.title}</h2></div></div><p class="text-slate-300 leading-relaxed mb-4">${t.desc}</p>${cb}${t.tips?`<div class="flex gap-3 p-4 rounded-xl bg-brand-500/5 border border-brand-500/10"><i class="fas fa-lightbulb text-brand-500 mt-0.5"></i><p class="text-sm text-slate-400 italic">${t.tips}</p></div>`:''}</div>`;cc.appendChild(s)});
        const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.remove('opacity-0','translate-y-4');const idx=tutorials.findIndex(t=>t.id===e.target.id);const pct=Math.round(((idx+1)/tutorials.length)*100);document.getElementById('progress-bar').style.width=pct+'%';document.getElementById('progress-text').innerText=pct+'%'}})},{rootMargin:'-10% 0px -60% 0px',threshold:0.1});
        document.querySelectorAll('section').forEach(el=>obs.observe(el));
    </script>
</body>
</html>
